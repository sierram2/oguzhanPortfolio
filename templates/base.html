<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}oguzhan aydilek{% endblock %}</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/transparent_cartoon_me.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    {% block head_extra %}{% endblock %}
</head>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-4M67CW2DBG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-4M67CW2DBG');
</script>

<body>
    <div class="background"></div>

    <header class="sticky-header">
        <div class="content-wrapper">
            <a href="/" id="home-link"><span id="site-title">oguzhan</span></a>
            <nav id="main-nav">
                <a href="/projects">projects</a>
                <a href="/blog">blog</a>
                <a href="/contact">contact</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer-banner">
        <div class="content-wrapper">
            <div class="icon-row">
                <a href="https://github.com/sierram2" target="_blank" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="https://www.linkedin.com/in/o%C4%9Fuzhan-aydilek-b17434408/" target="_blank" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="mailto:aydilekoguzhan@gmail.com" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
            </div>
            <p class="angst-tag">Made with tea by Oguzhan Aydilek</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // Normalizes the path by removing trailing slashes for the active check
            const currentPath = window.location.pathname.replace(/\/$/, "") || "/";
            
            document.querySelectorAll('#main-nav a').forEach(link => {
                const linkPath = link.getAttribute('href').replace(/\/$/, "") || "/";
                if (linkPath === currentPath) {
                    link.classList.add('active');
                }
            });

            if (currentPath === '/') {
                document.getElementById('site-title').classList.add('active');
            }
        });
    </script>
</body>
</html>
